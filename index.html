<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyPocket">
<title>MyPocket</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/home.css">
<link rel="stylesheet" href="css/chat.css">
<script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body>
<div id="wp"></div>

<!-- 主屏幕 -->
<div class="pg pg-home show" id="pg-home">
  <div class="h-sbar"><span class="h-sbar-time" id="stime">9:41</span><div class="h-sbar-icons"><svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1" opacity=".4"/><rect x="4.5" y="2" width="3" height="10" rx="1" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1" opacity=".8"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg><svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2L14.2 5C12.6 3.4 10.4 2.4 8 2.4z" opacity=".4"/><path d="M8 5.6c-1.6 0-3 .6-4.1 1.6L2 5.4C3.5 4 5.6 3.2 8 3.2s4.5.8 6 2.2L12.1 7.2C11 6.2 9.6 5.6 8 5.6z" opacity=".7"/><path d="M8 8.8c-.8 0-1.6.3-2.1.8L8 12l2.1-2.4C9.6 9.1 8.8 8.8 8 8.8z"/></svg><svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="white" stroke-width="1" fill="none" opacity=".35"/><rect x="1.5" y="2.5" width="16" height="7" rx="2" fill="white"/><path d="M23 4v4a2 2 0 000-4z" fill="white" opacity=".4"/></svg></div></div>
  <div class="h-clock"><div class="h-clock-t" id="ctime">9:41</div><div class="h-clock-d" id="cdate">1月1日 星期一</div></div>
  <div class="h-icons-wrap"><div class="h-icons-grid" id="icons-grid"></div></div>
  <div class="h-dock" id="dock"></div>
  <div class="h-edit-bar" id="edit-bar"><button class="h-done-btn" id="exit-edit-btn">完成</button></div>
</div>

<!-- 聊天列表 -->
<div class="pg pg-app right" id="pg-chat">
  <div class="hdr"><button class="hdr-back" id="chat-back-btn">&#8249;</button><span class="hdr-title">聊天</span></div>
  <div class="body" id="pn-msg"><div id="char-list"></div><div class="empty-s" id="char-empty"><div class="empty-ico">💬</div><div class="empty-txt">还没有角色<br>点右下角 ＋ 新建吧</div></div></div>
  <div class="btabs"><button class="btab on" id="bt-msg"><span class="bi">💬</span>消息</button><button class="btab" id="bt-dyn"><span class="bi">🌸</span>动态</button><button class="btab" id="bt-npc"><span class="bi">👥</span>NPC</button></div>
</div>

<!-- 聊天室（后续由 chat.css + chat.js 填充） -->
<div class="pg pg-app right" id="pg-conv">
  <div id="conv-header"></div>
  <div id="msgs"><div class="typing" id="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
  <div id="chat-toolbar"></div>
  <div id="chat-input-area"></div>
  <div id="msg-menu" class="msg-menu"></div>
  <div id="multi-bar" class="multi-bar"></div>
  <div id="heart-ov" class="heart-ov"></div>
</div>

<!-- 角色设置 -->
<div class="pg pg-app right" id="pg-cset">
  <div class="hdr"><button class="hdr-back" id="cset-back-btn">&#8249;</button><span class="hdr-title">聊天设置</span><button class="hdr-btn" id="cset-save-btn">保存</button></div>
  <div class="body" style="padding:16px" id="cset-body"></div>
</div>

<!-- 世界书 -->
<div class="pg pg-app right" id="pg-wb">
  <div class="hdr"><button class="hdr-back" id="wb-back-btn">&#8249;</button><span class="hdr-title">世界书</span><button class="hdr-btn" id="wb-add-btn" style="font-size:20px">＋</button></div>
  <div class="body"><div id="wb-list"></div><div class="empty-s" id="wb-empty"><div class="empty-ico">📖</div><div class="empty-txt">还没有世界书</div></div></div>
</div>

<!-- 外观 -->
<div class="pg pg-app right" id="pg-look">
  <div class="hdr"><button class="hdr-back" id="look-back-btn">&#8249;</button><span class="hdr-title">外观</span></div>
  <div class="body" style="padding:16px" id="look-body"></div>
</div>

<!-- 弹出面板 -->
<div class="sh-ov" id="sh-newchar"><div class="sheet"><div class="sh-top"><span class="sh-title">新建角色</span><button class="sh-x" onclick="closeSh('sh-newchar')">✕</button></div><input class="sh-inp" id="nc-name" placeholder="输入角色姓名..."><button class="btn-p" id="create-char-btn">创建并进入设置</button></div></div>

<!-- API 设置 -->
<div class="hs-ov" id="sh-hset"><div class="hs-sheet"><div class="hs-handle"></div><div class="hs-title">设置</div><div class="hs-sec"><div class="hs-sec-t">API 配置</div><div class="hs-group"><input class="hs-inp" id="s-base" placeholder="反代地址 https://..."><input class="hs-inp" id="s-key" type="password" placeholder="API Key"><div style="display:flex;gap:8px;margin-bottom:10px"><input class="hs-inp" id="s-model" placeholder="模型名称" style="flex:1;margin-bottom:0"><button class="hs-btn sec" id="fetch-models-btn" style="width:auto;padding:0 16px;margin:0;font-size:13px">拉取</button></div><select id="model-dd" style="display:none;width:100%;padding:11px;background:#f2f2f7;border:1.5px solid #e5e5ea;border-radius:10px;font-size:14px;outline:none;margin-top:8px"><option value="">选择模型</option></select></div></div><div class="hs-sec"><div class="hs-sec-t">Temperature</div><div class="hs-group"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><span>随机性</span><span id="temp-val" style="color:#007aff;font-weight:600">1.0</span></div><input type="range" id="temp-sl" min="0" max="2" step="0.1" value="1.0" style="width:100%;accent-color:#007aff"></div></div><div style="padding:0 16px"><button class="hs-btn" id="save-api-btn">保存设置</button><button class="hs-btn sec" id="cancel-api-btn">取消</button></div></div></div>

<div class="toast" id="toast"></div>
<input type="file" id="fi-av" accept="image/*">
<input type="file" id="fi-img" accept="image/*">
<input type="file" id="fi-chatbg" accept="image/*">
<input type="file" id="fi-sticker" accept="image/*" multiple>
<input type="file" id="fi-wb" accept=".txt,.json">
<input type="file" id="fi-look-wp" accept="image/*">
<input type="file" id="fi-look-chat-bg" accept="image/*">
<input type="file" id="fi-look-icon" accept="image/*">

<!-- JS 加载顺序 -->
<script src="js/db.js"></script>
<script src="js/state.js"></script>
<script src="js/utils.js"></script>
<script src="js/ui.js"></script>
<script src="js/api.js"></script>
<script src="js/chat_render.js"></script>
<script src="js/chat.js"></script>
<script src="js/chat_ops.js"></script>
<script src="js/char_settings.js"></script>
<script src="js/main.js"></script>
</body>
</html>
