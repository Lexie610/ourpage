<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MyPocket">
<title>MyPocket</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  height: 100dvh; max-width: 480px; margin: 0 auto;
  position: relative; overflow: hidden; background: #000;
}
#wallpaper {
  position: absolute; inset: 0;
  background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);
  background-size: cover; background-position: center;
  transition: all 0.5s ease;
}
#wallpaper::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom,rgba(0,0,0,.12) 0%,rgba(0,0,0,.04) 40%,rgba(0,0,0,.28) 100%);
}
.status-bar {
  position: absolute; top: 0; left: 0; right: 0;
  height: 44px; padding: 12px 22px 0;
  display: flex; justify-content: space-between; align-items: center; z-index: 10;
}
.status-time { color: white; font-size: 15px; font-weight: 600; letter-spacing: .3px; }
.status-icons { display: flex; gap: 6px; align-items: center; }
.status-icons svg { fill: white; }
.clock-area {
  position: absolute; top: 58px; left: 0; right: 0;
  text-align: center; z-index: 5; padding: 16px 0;
}
.clock-time {
  font-size: 76px; font-weight: 200; color: white;
  letter-spacing: -2px; line-height: 1;
  text-shadow: 0 2px 20px rgba(0,0,0,.3);
}
.clock-date {
  font-size: 17px; color: rgba(255,255,255,.85);
  margin-top: 6px; font-weight: 400;
  text-shadow: 0 1px 8px rgba(0,0,0,.3);
}
.icons-container {
  position: absolute; top: 218px; left: 0; right: 0; bottom: 112px;
  overflow-y: auto; overflow-x: hidden; padding: 8px 22px;
  scrollbar-width: none;
}
.icons-container::-webkit-scrollbar { display: none; }
.icons-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 18px 8px; padding-bottom: 16px;
}
.app-icon {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; cursor: pointer; position: relative;
  -webkit-touch-callout: none;
}
.app-icon:active .icon-wrap { transform: scale(0.9); }
.icon-wrap {
  width: 68px; height: 68px; border-radius: 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 34px; transition: transform .12s ease;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 14px rgba(0,0,0,.25);
}
.icon-wrap img { width:100%; height:100%; object-fit:cover; border-radius:16px; }
.icon-label {
  font-size: 11px; color: white; font-weight: 400;
  text-align: center; width: 78px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  text-shadow: 0 1px 4px rgba(0,0,0,.6);
}
.delete-btn {
  display: none; position: absolute; top: -5px; left: -5px;
  width: 20px; height: 20px; background: rgba(0,0,0,.75);
  color: white; border-radius: 50%; font-size: 12px;
  align-items: center; justify-content: center;
  z-index: 10; border: none; cursor: pointer; line-height: 1;
}
.edit-mode .delete-btn { display: flex; }
@keyframes wiggle {
  0%,100%{transform:rotate(0)} 20%{transform:rotate(-2deg)} 60%{transform:rotate(2deg)}
}
.edit-mode .app-icon { animation: wiggle .55s infinite; }
.edit-mode .app-icon:nth-child(2n){animation-delay:.08s}
.edit-mode .app-icon:nth-child(3n){animation-delay:.18s}
.dock {
  position: absolute; bottom: 18px; left: 14px; right: 14px;
  height: 84px;
  background: rgba(255,255,255,.18);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-radius: 26px; border: 1px solid rgba(255,255,255,.26);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 8px; box-shadow: 0 4px 20px rgba(0,0,0,.22); z-index: 10;
}
.dock .app-icon:active .icon-wrap { transform: scale(0.88); }
.ic-chat    { background: linear-gradient(145deg,#34d399,#059669); }
.ic-settings{ background: linear-gradient(145deg,#9ca3af,#6b7280); }
.ic-wb      { background: linear-gradient(145deg,#60a5fa,#2563eb); }
.ic-phone   { background: linear-gradient(145deg,#f472b6,#db2777); }
.ic-weibo   { background: linear-gradient(145deg,#fb923c,#ea580c); }
.ic-x       { background: linear-gradient(145deg,#4b5563,#111827); }
.ic-group   { background: linear-gradient(145deg,#a78bfa,#7c3aed); }
.ic-look    { background: linear-gradient(145deg,#fbbf24,#d97706); }
.edit-bar {
  display: none; position: absolute; top: 0; left: 0; right: 0;
  height: 44px; background: rgba(0,0,0,.5);
  backdrop-filter: blur(10px); align-items: center;
  justify-content: flex-end; padding: 0 16px; z-index: 20;
}
.edit-bar.show { display: flex; }
.edit-done {
  background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4);
  color: white; border-radius: 8px; padding: 5px 14px;
  font-size: 14px; font-weight: 500; cursor: pointer;
  font-family: 'Noto Sans SC',sans-serif;
}
.sheet-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(0,0,0,.45); display: none;
  align-items: flex-end; backdrop-filter: blur(3px);
}
.sheet-overlay.show { display: flex; }
.sheet {
  background: #f2f2f7; border-radius: 22px 22px 0 0;
  width: 100%; max-height: 90vh; overflow-y: auto;
  padding: 0 0 44px;
  animation: slideUp .3s cubic-bezier(.32,.72,0,1);
}
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: rgba(0,0,0,.18); margin: 10px auto 4px;
}
.sheet-title {
  font-size: 17px; font-weight: 700; text-align: center;
  padding: 8px 20px 14px; color: #1c1c1e;
}
.sheet-section { margin: 0 16px 14px; }
.sheet-section-title {
  font-size: 12px; color: #6e6e73; font-weight: 500;
  text-transform: uppercase; letter-spacing: .05em; padding: 0 4px 7px;
}
.sheet-group { background: white; border-radius: 14px; overflow: hidden; }
.sheet-row {
  display: flex; align-items: center; padding: 13px 14px;
  border-bottom: .5px solid #e5e5ea; gap: 10px; min-height: 50px;
}
.sheet-row:last-child { border-bottom: none; }
.sheet-row-icon {
  width: 30px; height: 30px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.sheet-row-label { flex: 1; font-size: 15px; color: #1c1c1e; }
.sheet-row-value { font-size: 14px; color: #6e6e73; }
.wallpaper-grid {
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; padding: 12px;
}
.wp-item {
  aspect-ratio: 9/16; border-radius: 12px; overflow: hidden;
  cursor: pointer; border: 3px solid transparent; transition: border-color .15s; position: relative;
}
.wp-item.active { border-color: #007aff; }
.wp-item img { width:100%; height:100%; object-fit:cover; }
.wp-check {
  position: absolute; inset: 0; display: none;
  align-items: center; justify-content: center;
  background: rgba(0,122,255,.28); color: white; font-size: 22px; font-weight: 700;
}
.wp-item.active .wp-check { display: flex; }
.wp-add {
  aspect-ratio: 9/16; border-radius: 12px;
  border: 2px dashed #c7c7cc; display: flex;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 6px; cursor: pointer;
  color: #6e6e73; font-size: 12px;
}
.wp-add-icon { font-size: 26px; }
.api-provider-tabs { display: flex; gap: 8px; padding: 0 16px 12px; }
.api-tab {
  flex: 1; padding: 9px; background: white; border-radius: 10px;
  border: 2px solid transparent; text-align: center; font-size: 13px;
  color: #6e6e73; cursor: pointer; font-family: 'Noto Sans SC',sans-serif;
}
.api-tab.active { border-color: #007aff; color: #007aff; font-weight: 600; }
.sheet-input {
  background: #f2f2f7; border: 1.5px solid transparent; border-radius: 10px;
  padding: 11px 14px; font-size: 15px; width: 100%;
  font-family: 'Noto Sans SC',sans-serif; color: #1c1c1e;
  outline: none; display: block; margin-bottom: 10px; transition: border-color .2s;
}
.sheet-input:focus { border-color: #007aff; background: white; }
.sheet-btn {
  width: 100%; padding: 15px; border-radius: 14px;
  background: #007aff; color: white; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer;
  font-family: 'Noto Sans SC',sans-serif; margin-bottom: 10px;
  transition: opacity .15s;
}
.sheet-btn:active { opacity: .8; }
.sheet-btn.secondary { background: white; color: #007aff; border: 1.5px solid #e5e5ea; }
.sheet-btn.danger { background: #ff3b30; }
.toast {
  position: absolute; bottom: 120px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: rgba(28,28,30,.88); color: white;
  padding: 10px 22px; border-radius: 20px; font-size: 13px;
  opacity: 0; transition: all .25s; z-index: 200;
  white-space: nowrap; pointer-events: none; backdrop-filter: blur(8px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
input[type=file] { display: none; }
</style>
</head>
<body>

<div id="wallpaper"></div>

<div class="status-bar">
  <span class="status-time" id="status-time">9:41</span>
  <div class="status-icons">
    <svg width="17" height="12" viewBox="0 0 17 12"><rect x="0" y="3" width="3" height="9" rx="1" opacity=".4"/><rect x="4.5" y="2" width="3" height="10" rx="1" opacity=".6"/><rect x="9" y="0" width="3" height="12" rx="1" opacity=".8"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg>
    <svg width="16" height="12" viewBox="0 0 16 12"><path d="M8 2.4C5.6 2.4 3.4 3.4 1.8 5L0 3.2C2.1 1.2 4.9 0 8 0s5.9 1.2 8 3.2L14.2 5C12.6 3.4 10.4 2.4 8 2.4z" opacity=".4"/><path d="M8 5.6c-1.6 0-3 .6-4.1 1.6L2 5.4C3.5 4 5.6 3.2 8 3.2s4.5.8 6 2.2L12.1 7.2C11 6.2 9.6 5.6 8 5.6z" opacity=".7"/><path d="M8 8.8c-.8 0-1.6.3-2.1.8L8 12l2.1-2.4C9.6 9.1 8.8 8.8 8 8.8z"/></svg>
    <svg width="25" height="12" viewBox="0 0 25 12"><rect x="0" y="1" width="22" height="10" rx="3" stroke="white" stroke-width="1" fill="none" opacity=".35"/><rect x="1.5" y="2.5" width="16" height="7" rx="2" fill="white"/><path d="M23 4v4a2 2 0 000-4z" fill="white" opacity=".4"/></svg>
  </div>
</div>

<div class="clock-area">
  <div class="clock-time" id="clock-time">9:41</div>
  <div class="clock-date" id="clock-date">3月22日 星期六</div>
</div>

<div class="icons-container" id="icons-container">
  <div class="icons-grid" id="icons-grid"></div>
</div>

<div class="dock" id="dock"></div>

<div class="edit-bar" id="edit-bar">
  <button class="edit-done" onclick="exitEditMode()">完成</button>
</div>

<div class="toast" id="toast"></div>

<!-- ══ SETTINGS SHEET ══ -->
<div class="sheet-overlay" id="sh-settings">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">设置</div>
    <div class="sheet-section">
      <div class="sheet-section-title">API 配置</div>
      <div class="api-provider-tabs">
        <button class="api-tab active" id="tab-claude" onclick="switchProvider('claude')">Claude</button>
        <button class="api-tab" id="tab-gemini" onclick="switchProvider('gemini')">Gemini</button>
      </div>
      <div class="sheet-group" style="padding:14px">
        <input class="sheet-input" id="api-base" placeholder="反代地址 https://...">
        <input class="sheet-input" id="api-key" type="password" placeholder="API Key  sk-...">
        <input class="sheet-input" id="api-model" placeholder="模型名称" style="margin-bottom:0">
      </div>
    </div>
    <div class="sheet-section">
      <div class="sheet-section-title">用户信息</div>
      <div class="sheet-group" style="padding:14px">
        <input class="sheet-input" id="user-name" placeholder="我的名字" style="margin-bottom:0">
      </div>
    </div>
    <div style="padding:0 16px">
      <button class="sheet-btn" onclick="saveSettings()">保存设置</button>
      <button class="sheet-btn secondary" onclick="closeSheet('sh-settings')">取消</button>
    </div>
  </div>
</div>

<!-- ══ APPEARANCE SHEET ══ -->
<div class="sheet-overlay" id="sh-appearance">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">外观</div>
    <div class="sheet-section">
      <div class="sheet-section-title">壁纸</div>
      <div class="wallpaper-grid" id="wp-grid"></div>
    </div>
    <div style="padding:0 16px">
      <button class="sheet-btn secondary" onclick="closeSheet('sh-appearance')">关闭</button>
    </div>
  </div>
</div>

<input type="file" id="fi-wp" accept="image/*" onchange="handleWpUpload(event)">

<script>
const APPS = [
  {id:'chat',    label:'聊天',    emoji:'💬', color:'ic-chat',    href:'chat.html',   dock:true },
  {id:'settings',label:'设置',    emoji:'⚙️', color:'ic-settings',href:'#settings',   dock:false},
  {id:'wb',      label:'世界书',  emoji:'📖', color:'ic-wb',      href:'#wb',         dock:false},
  {id:'phone',   label:'他的手机',emoji:'📱', color:'ic-phone',   href:'#phone',      dock:false},
  {id:'weibo',   label:'微博',    emoji:'🌸', color:'ic-weibo',   href:'#weibo',      dock:false},
  {id:'x',       label:'X',       emoji:'✖️', color:'ic-x',       href:'#x',          dock:false},
  {id:'group',   label:'小组',    emoji:'👥', color:'ic-group',   href:'#group',      dock:false},
  {id:'look',    label:'外观',    emoji:'🎨', color:'ic-look',    href:'#appearance', dock:false},
];

let editMode = false;
let provider = 'claude';

// Clock
function tick() {
  const n = new Date();
  const t = n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
  document.getElementById('clock-time').textContent = t;
  document.getElementById('status-time').textContent = t;
  const days=['星期日','星期一','星期二','星期三','星期四','星期五','星期六'];
  document.getElementById('clock-date').textContent =
    `${n.getMonth()+1}月${n.getDate()}日 ${days[n.getDay()]}`;
}
setInterval(tick,1000); tick();

// Render
function render() {
  const grid = document.getElementById('icons-grid');
  const dock = document.getElementById('dock');
  const gridApps = APPS.filter(a=>!a.dock);
  const dockApps = APPS.filter(a=>a.dock);

  grid.innerHTML = gridApps.map(a=>`
    <div class="app-icon" onclick="tap('${a.id}','${a.href}')">
      <button class="delete-btn" onclick="event.stopPropagation()">✕</button>
      <div class="icon-wrap ${a.color}">${a.emoji}</div>
      <div class="icon-label">${a.label}</div>
    </div>`).join('');

  dock.innerHTML = dockApps.map(a=>`
    <div class="app-icon" onclick="tap('${a.id}','${a.href}')">
      <div class="icon-wrap ${a.color}">${a.emoji}</div>
      <div class="icon-label">${a.label}</div>
    </div>`).join('');
}

function tap(id, href) {
  if (editMode) return;
  if (href==='#settings')   { openSheet('sh-settings'); loadSettings(); return; }
  if (href==='#appearance') { openSheet('sh-appearance'); loadWp(); return; }
  if (href.endsWith('.html')) { window.location.href=href; return; }
  showToast('即将开放 🚧');
}

// Long press → edit mode
let lpt;
document.getElementById('icons-container').addEventListener('touchstart',e=>{
  if(editMode)return;
  lpt=setTimeout(()=>{ editMode=true; document.getElementById('icons-grid').classList.add('edit-mode'); document.getElementById('edit-bar').classList.add('show'); navigator.vibrate&&navigator.vibrate(35); },600);
},{passive:true});
document.getElementById('icons-container').addEventListener('touchend',()=>clearTimeout(lpt),{passive:true});
document.getElementById('icons-container').addEventListener('touchmove',()=>clearTimeout(lpt),{passive:true});

function exitEditMode(){
  editMode=false;
  document.getElementById('icons-grid').classList.remove('edit-mode');
  document.getElementById('edit-bar').classList.remove('show');
}

// Wallpaper
const WP_PRESETS = [
  {id:'p1',g:'linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)'},
  {id:'p2',g:'linear-gradient(135deg,#2d1b69,#11998e,#38ef7d)'},
  {id:'p3',g:'linear-gradient(135deg,#141e30,#243b55)'},
  {id:'p4',g:'linear-gradient(135deg,#f093fb,#f5576c)'},
  {id:'p5',g:'linear-gradient(135deg,#4facfe,#00f2fe)'},
  {id:'p6',g:'linear-gradient(135deg,#43e97b,#38f9d7)'},
];

function loadWp() {
  const active = localStorage.getItem('mp_wp') || 'p1';
  const customs = JSON.parse(localStorage.getItem('mp_wp_custom')||'[]');
  let html = `<div class="wp-add" onclick="document.getElementById('fi-wp').click()"><div class="wp-add-icon">＋</div><div>自定义</div></div>`;
  WP_PRESETS.forEach(p=>{
    html+=`<div class="wp-item ${active===p.id?'active':''}" onclick="setWp('${p.id}','',\`${p.g}\`)" style="background:${p.g}"><div class="wp-check">✓</div></div>`;
  });
  customs.forEach((c,i)=>{
    const cid='c'+i;
    html+=`<div class="wp-item ${active===cid?'active':''}" onclick="setWp('${cid}','${c}','')"><img src="${c}"><div class="wp-check">✓</div></div>`;
  });
  document.getElementById('wp-grid').innerHTML=html;
}

function setWp(id, url, grad) {
  localStorage.setItem('mp_wp',id);
  const el=document.getElementById('wallpaper');
  if(url){el.style.backgroundImage=`url('${url}')`;el.style.background='';}
  else{el.style.background=grad;el.style.backgroundImage='';}
  loadWp(); showToast('壁纸已设置 ✓');
}

function handleWpUpload(e) {
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const cs=JSON.parse(localStorage.getItem('mp_wp_custom')||'[]');
    cs.push(ev.target.result);
    localStorage.setItem('mp_wp_custom',JSON.stringify(cs));
    setWp('c'+(cs.length-1),ev.target.result,'');
    loadWp();
  };
  r.readAsDataURL(f);
}

function applyStoredWp() {
  const id=localStorage.getItem('mp_wp')||'p1';
  const el=document.getElementById('wallpaper');
  const p=WP_PRESETS.find(x=>x.id===id);
  if(p){el.style.background=p.g;}
  else if(id.startsWith('c')){
    const cs=JSON.parse(localStorage.getItem('mp_wp_custom')||'[]');
    const c=cs[parseInt(id.slice(1))];
    if(c)el.style.backgroundImage=`url('${c}')`;
  }
}

// Settings
function loadSettings() {
  const s=JSON.parse(localStorage.getItem('mypocket_settings')||'{}');
  provider=s.apiProvider||'claude';
  document.getElementById('api-base').value=provider==='claude'?(s.claudeBase||''):(s.geminiBase||'');
  document.getElementById('api-key').value=provider==='claude'?(s.claudeKey||''):(s.geminiKey||'');
  document.getElementById('api-model').value=provider==='claude'?(s.claudeModel||''):(s.geminiModel||'');
  document.getElementById('user-name').value=s.userName||'';
  document.getElementById('tab-claude').classList.toggle('active',provider==='claude');
  document.getElementById('tab-gemini').classList.toggle('active',provider==='gemini');
  updatePh();
}

function switchProvider(p){
  provider=p;
  document.getElementById('tab-claude').classList.toggle('active',p==='claude');
  document.getElementById('tab-gemini').classList.toggle('active',p==='gemini');
  updatePh();
}

function updatePh(){
  document.getElementById('api-base').placeholder=provider==='claude'?'反代地址 https://api.anthropic.com':'反代地址 https://generativelanguage.googleapis.com';
  document.getElementById('api-model').placeholder=provider==='claude'?'claude-sonnet-4-5':'gemini-2.0-flash';
}

function saveSettings(){
  const base=document.getElementById('api-base').value.trim();
  const key=document.getElementById('api-key').value.trim();
  const model=document.getElementById('api-model').value.trim();
  const name=document.getElementById('user-name').value.trim();
  const s={
    apiProvider:provider,
    claudeBase:provider==='claude'?base:'',claudeKey:provider==='claude'?key:'',claudeModel:provider==='claude'?model:'',
    geminiBase:provider==='gemini'?base:'',geminiKey:provider==='gemini'?key:'',geminiModel:provider==='gemini'?model:'',
    userName:name
  };
  localStorage.setItem('mypocket_settings',JSON.stringify(s));
  showToast('已保存 ✓'); closeSheet('sh-settings');
}

// Sheet
function openSheet(id){document.getElementById(id).classList.add('show');}
function closeSheet(id){document.getElementById(id).classList.remove('show');}
document.querySelectorAll('.sheet-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('show');});
});

// Toast
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// Init
applyStoredWp();
render();
</script>
</body>
</html>
